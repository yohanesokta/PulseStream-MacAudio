<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTMP Dashboard Manager</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./main.css">
</head>
<body>

<div class="dashboard-container">
    <header class="header">
        <h1>Stream Dashboard</h1>
    </header>

    <main class="content">
        <div class="section-title">Service Status</div>
        <div class="status-box">
            <div class="service-name">
                <i class="fas fa-network-wired"></i> NGINX RTMP
            </div>
            <div class="badge active" id="statusBadge">
                <span class="pulse-dot"></span> Online
            </div>
        </div>

        <div class="section-title">Action Controls</div>
        <div class="controls-wrapper">

            <button class="btn-start" onclick="startFfmpeg()">
                <i class="fas fa-play"></i> Start FFmpeg Listen
            </button>

            <div class="volume-control">
                <div class="volume-header">
                    <span><i class="fas fa-sliders-h"></i> Input Volume</span>
                    <span id="volumeValue" style="color: var(--primary); font-weight: bold;">75%</span>
                </div>
                <div class="volume-slider-container">
                    <i class="fas fa-volume-down"></i>
                    <input type="range" id="volumeSlider" min="0" max="100" value="75">
                    <i class="fas fa-volume-up"></i>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="./main.js"></script>
</body>
</html>
