<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTMP Dashboard Manager</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --card-bg: #1e293b; /* Slate 800 */
            --text-main: #f8fafc; /* Slate 50 */
            --text-muted: #94a3b8; /* Slate 400 */
            --primary: #3b82f6; /* Blue 500 */
            --primary-hover: #2563eb; /* Blue 600 */
            --success: #10b981; /* Emerald 500 */
            --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #ef4444; /* Red 500 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .dashboard-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header h1 i {
            color: var(--primary);
            margin-right: 8px;
        }

        .content {
            padding: 24px;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .status-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .service-name {
            font-size: 1.1rem;
            font-weight: 500;
        }
        .service-name i {
            margin-right: 8px;
            color: var(--text-muted);
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background-color: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .btn-start {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
            background: linear-gradient(135deg, var(--primary-hover), #4f46e5);
        }
        .btn-start:active {
            transform: translateY(0);
        }
        .volume-control {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
        }

        .volume-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .volume-slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .volume-slider-container i {
            color: var(--text-muted);
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            border: 2px solid var(--primary);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #334155;
            border-radius: 4px;
        }

        input[type=range]:focus {
            outline: none;
        }

        @media (max-width: 480px) {
            .status-box {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header class="header">
        <h1><i class="fas fa-satellite-dish"></i> Stream Dashboard</h1>
    </header>

    <main class="content">
        <div class="section-title">Service Status</div>
        <div class="status-box">
            <div class="service-name">
                <i class="fas fa-network-wired"></i> NGINX RTMP
            </div>
            <div class="badge active" id="statusBadge">
                <span class="pulse-dot"></span> Online
            </div>
        </div>

        <div class="section-title">Action Controls</div>
        <div class="controls-wrapper">

            <button class="btn-start" onclick="startFfmpeg()">
                <i class="fas fa-play"></i> Start FFmpeg Listen
            </button>

            <div class="volume-control">
                <div class="volume-header">
                    <span><i class="fas fa-sliders-h"></i> Input Volume</span>
                    <span id="volumeValue" style="color: var(--primary); font-weight: bold;">75%</span>
                </div>
                <div class="volume-slider-container">
                    <i class="fas fa-volume-down"></i>
                    <input type="range" id="volumeSlider" min="0" max="100" value="75">
                    <i class="fas fa-volume-up"></i>
                </div>
            </div>

        </div>
    </main>
</div>

<script>
    // Script sederhana untuk mengatur angka persentase volume secara real-time
    const slider = document.getElementById("volumeSlider");
    const volumeValueText = document.getElementById("volumeValue");

    slider.oninput = function() {
        volumeValueText.innerHTML = this.value + "%";
    }

    // Fungsi dummy saat tombol start ditekan (Bisa dihubungkan ke backend API kamu)
    function startFfmpeg() {
        const btn = document.querySelector('.btn-start');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Starting...';
        btn.style.opacity = '0.8';
        btn.style.cursor = 'not-allowed';

        // Simulasi loading 2 detik lalu kembali ke semula
        setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-stop"></i> Stop FFmpeg Listen';
            btn.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)'; // Berubah warna jadi merah (Stop)
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
        }, 2000);
    }
</script>
</body>
</html>
